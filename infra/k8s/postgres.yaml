apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sdet
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: sdet }
            - { name: POSTGRES_PASSWORD, value: sdet }
            - { name: POSTGRES_DB, value: sdet }
          ports:
            - { containerPort: 5432, name: pg }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "sdet"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sdet
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: pg }
