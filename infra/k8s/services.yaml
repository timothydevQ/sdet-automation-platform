apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: sdet }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth
          image: sdet/auth-service:latest
          env:
            - { name: DB_DSN, value: "postgres://sdet:sdet@postgres:5432/sdet?sslmode=disable" }
            - { name: JWT_SECRET, value: "dev-secret" }
            - { name: PORT, value: "8081" }
          ports: [{ containerPort: 8081 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8081 }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: sdet }
spec:
  selector: { app: auth-service }
  ports: [{ port: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: catalog-service, namespace: sdet }
spec:
  replicas: 2
  selector: { matchLabels: { app: catalog-service } }
  template:
    metadata: { labels: { app: catalog-service } }
    spec:
      containers:
        - name: catalog
          image: sdet/catalog-service:latest
          env:
            - { name: DB_DSN, value: "postgres://sdet:sdet@postgres:5432/sdet?sslmode=disable" }
            - { name: PORT, value: "8082" }
          ports: [{ containerPort: 8082 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8082 }
---
apiVersion: v1
kind: Service
metadata: { name: catalog-service, namespace: sdet }
spec:
  selector: { app: catalog-service }
  ports: [{ port: 8082 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: order-service, namespace: sdet }
spec:
  replicas: 2
  selector: { matchLabels: { app: order-service } }
  template:
    metadata: { labels: { app: order-service } }
    spec:
      containers:
        - name: order
          image: sdet/order-service:latest
          env:
            - { name: DB_DSN, value: "postgres://sdet:sdet@postgres:5432/sdet?sslmode=disable" }
            - { name: REDIS_ADDR, value: "redis:6379" }
            - { name: KAFKA_BROKERS, value: "kafka:9092" }
            - { name: CATALOG_URL, value: "http://catalog-service:8082" }
            - { name: PAYMENT_URL, value: "http://payment-service:8083" }
            - { name: AUTH_URL, value: "http://auth-service:8081" }
            - { name: PORT, value: "8084" }
          ports: [{ containerPort: 8084 }]
---
apiVersion: v1
kind: Service
metadata: { name: order-service, namespace: sdet }
spec:
  selector: { app: order-service }
  ports: [{ port: 8084 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: sdet }
spec:
  replicas: 3
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: gw
          image: sdet/api-gateway:latest
          env:
            - { name: AUTH_URL, value: "http://auth-service:8081" }
            - { name: CATALOG_URL, value: "http://catalog-service:8082" }
            - { name: ORDER_URL, value: "http://order-service:8084" }
            - { name: PORT, value: "8080" }
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: sdet }
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 8080 }]
