name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Vet Go services
        run: |
          for d in apps/api-gateway apps/auth-service apps/catalog-service \
                   apps/order-service apps/payment-service apps/notification-service \
                   tests/go-integration; do
            (cd "$d" && go mod tidy && go vet ./...)
          done
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd apps/web && npm install && npm run build
      - run: cd tests/e2e-playwright-ts && npm install
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r tests/api-python/requirements.txt
      - run: cd tests/api-python && python -m pytest --collect-only -q

  smoke:
    needs: lint-and-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [api, e2e, java, dotnet]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - run: ./scripts/seed-db.sh
      - run: ./scripts/run-suite.sh ${{ matrix.suite }} smoke
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.suite }}
          path: artifacts/
          if-no-files-found: ignore
      - if: always()
        run: docker compose logs > artifacts/compose.log || true
