name: security-tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - run: ./scripts/seed-db.sh
      - run: make test-security
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: zap-report, path: artifacts/ }
