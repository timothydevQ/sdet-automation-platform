name: e2e-tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

jobs:
  playwright:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
      - run: ./scripts/seed-db.sh
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd tests/e2e-playwright-ts && npm install && npx playwright install --with-deps ${{ matrix.browser }}
      - run: cd tests/e2e-playwright-ts && npx playwright test --project=${{ matrix.browser }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}
          path: artifacts/
